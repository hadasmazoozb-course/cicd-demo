name: Python Docker CI

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-node@v4 # כלי עזר של גיטהאב להכנת הסביבה
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Unit Tests
        run: |
          python test_app.py

      - name: Build Docker Image
        run: |
          docker build -t python-cicd-app .
